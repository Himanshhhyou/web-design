<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Set the character set to UTF-8 -->
  <meta charset="UTF-8">
  <!-- Define viewport settings for responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Ensure compatibility with Internet Explorer -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- Set the document title -->
  <title>Shrink & Expand</title>
  
  <!-- External Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Radio buttons for shrink and expand -->
  <input type="radio" name="group" id="shrink">
  <label for="shrink">Shrink</label>
  <input type="radio" name="group" id="expand">
  <label for="expand">Expand</label>
  <!-- Container div for the effect -->
  <div></div>
</body>

</html>
