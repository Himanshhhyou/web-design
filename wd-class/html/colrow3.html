<!DOCTYPE html>
<html>
	<head>
		<title>Rowspan and Colspan</title>
	</head>
	<body>
		<table>
			<tr>
				<td>A</td>
				<td colspan="4">B</td>
			</tr>
			<tr>
				<td>C</td>
				<td colspan="2" rowspan="2">D</td>
				<td>E</td>
				<td>F</td>
			</tr>
			<tr>
				<td>G</td>
				<td>H</td>
				<td>I</td>
			</tr>
			<tr>
				<td colspan="4">J</td>
			</tr>
			<tr>
				<td>K</td>
				<td>L</td>
				<td>M</td>
				<td>N</td>
			</tr>
		</table>
	</body>
</html>
