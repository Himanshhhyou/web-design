<!DOCTYPE html>
<html>
	<head>
		<title>Forms in HTML</title>
	</head>
	<body>
		<form>
			<fieldset>
				<legend>Registration form</legend>
				Name: <input type="text"><br><br>

				Age: <input type="number"><br><br>

				Gender: Male <input type = "radio" name="gen">
					 	Female <input type = "radio" name="gen"><br><br>
				
				DOB: <input type = "date"><br><br>

				Course applied for:
				<select>
					<option>BCA</option>
					<option>MCA</option>
					<option>BSC</option>
					<option>MSC</option>
					<option>BA</option>
				</select><br><br>	
				
				Hobbies: <br>
				<input type="checkbox">Reading<br>
				<input type="checkbox">Gaming<br>
				<input type="checkbox">Coding<br>
				<input type="checkbox">Cooking<br>

				Upload your photograph here: <input type="file"><br><br>

				Address: <textarea></textarea><br><br>

				<input type="checkbox">Accept terms & conditions<br><br>

				<button>Next </button>

				<input type = "submit">
				<input type = "reset">
			
			
			</fieldset>
		</form>
	</body>
</html>
